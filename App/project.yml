# XcodeGen spec for the Hyperfocal app target. The engine, vendored Adobe DNG
# SDK, and CLI live in the SwiftPM package at the repo root; this project holds
# only the app layer. Regenerate with:  cd App && xcodegen generate
name: Hyperfocal
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  HyperfocalKit:
    path: ..

# Shared scheme with a test action: xcodebuild test needs it (XcodeGen's
# implicit per-target schemes are user-scoped and carry no tests).
schemes:
  Hyperfocal:
    build:
      targets:
        Hyperfocal: all
  HyperfocalBridge:
    build:
      targets:
        HyperfocalBridge: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HyperfocalUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Hyperfocal:
    type: application
    platform: macOS
    sources:
      - Sources
      # Shared model layer (AppModel, Stack, ProjectStore, RetouchSession):
      # single source of truth, also compiled headless by the retouch-probe
      # SwiftPM target (see Package.swift). Never copy these files.
      - path: ../AppCore
      - Assets.xcassets
      # Document icon for .hyperfocal files (macOS does not auto-generate
      # one; without it Finder shows a "?" page). Regenerate from the app
      # icon: white generic-document page + centered app-icon badge.
      - DocumentIcon.icns
      # Crop-rotation cursor art (sectors 0 = top-left corner and 1 = top
      # edge; the other six orientations are derived by flip/transpose at
      # load — see CropOverlayNSView.rotateCursors). Listed as files so
      # they land at the bundle root where NSImage(named:) pairs the @2x.
      - Resources/crop-rotate-0.png
      - Resources/crop-rotate-0@2x.png
      - Resources/crop-rotate-1.png
      - Resources/crop-rotate-1@2x.png
    dependencies:
      - package: HyperfocalKit
        product: HyperfocalKit
    # Sandboxed in every build (not just MAS) so the dev build exercises the
    # same file-access rules the App Store requires. Frame access outside the
    # container comes from NSOpenPanel/drag grants, persisted across launches
    # as security-scoped bookmarks in project manifests (see ProjectStore).
    entitlements:
      path: Hyperfocal.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        # Required to create/resolve app-scoped security bookmarks (the ones
        # ProjectStore persists). Without it bookmarkData(.withSecurityScope)
        # throws and every project saves with no bookmarks — frames then
        # can't be read after relaunch.
        com.apple.security.files.bookmarks.app-scope: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethannicholas.hyperfocal
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Y3GFBT2WQ2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # No non-exempt encryption (the app makes no network calls beyond
        # opening an HTTPS link); answers App Store Connect's per-build
        # export-compliance question so uploads don't stall on it.
        ITSAppUsesNonExemptEncryption: false
        CFBundleDisplayName: Hyperfocal
        LSApplicationCategoryType: public.app-category.photography
        NSHumanReadableCopyright: "© 2026 Ethan Nicholas"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        # .hyperfocal projects: owning the exported type gives the files a
        # Hyperfocal-badged document icon and makes double-click (and Dock
        # drops) launch the app — AppDelegate.application(_:open:) routes
        # them to the open-project flow. Projects are store-only zips, so
        # the type honestly conforms to zip-archive (rename-to-.zip works).
        CFBundleDocumentTypes:
          - CFBundleTypeName: Hyperfocal Project
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes: [com.ethannicholas.hyperfocal.project]
            CFBundleTypeIconFile: DocumentIcon
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.ethannicholas.hyperfocal.project
            UTTypeDescription: Hyperfocal Project
            UTTypeConformsTo: [com.pkware.zip-archive]
            UTTypeIconFile: DocumentIcon
            UTTypeTagSpecification:
              public.filename-extension: [hyperfocal]

  # C-ABI bridge the Qt shell drives (cross-platform-plan Phase 2): the same
  # AppCore sources the app compiles, plus the @_cdecl surface in ../Bridge,
  # as a dynamic library. A development artifact for the Qt shell only —
  # never shipped with the Mac app. Lives here (not Package.swift) because
  # SwiftPM refuses two targets sharing the AppCore sources with the probe;
  # the SwiftPM seam arrives when AppCore becomes a real module (plan 0d).
  HyperfocalBridge:
    type: library.dynamic
    platform: macOS
    sources:
      - path: ../Bridge
      - path: ../AppCore
    dependencies:
      - package: HyperfocalKit
        product: HyperfocalKit
    settings:
      base:
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Y3GFBT2WQ2
        # Qt resolves the link through its executable's rpath. Must match
        # the product's actual file name (Xcode dylib targets don't get a
        # "lib" prefix).
        LD_DYLIB_INSTALL_NAME: "@rpath/HyperfocalBridge.dylib"
        SKIP_INSTALL: YES

  # XCUITest smoke suite (App/HyperfocalUITests). Fixtures are generated by
  # Scripts/ui-test.sh into the app's sandbox container; tests launch the
  # app with the HYPERFOCAL_UITEST env hooks (see UITestSupport.swift).
  HyperfocalUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - HyperfocalUITests
    dependencies:
      - target: Hyperfocal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ethannicholas.hyperfocal.uitests
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: Y3GFBT2WQ2
        TEST_TARGET_NAME: Hyperfocal
        GENERATE_INFOPLIST_FILE: YES
