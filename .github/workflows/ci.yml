name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux (build + synth PSNR gates + probe)
    runs-on: ubuntu-latest
    container: swift:6.1-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          apt-get update
          apt-get install -y build-essential pkg-config \
            libraw-dev liblcms2-dev libexiv2-dev libjpeg-turbo8-dev \
            libtiff-dev libpng-dev zlib1g-dev libopencv-dev

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Build and run regression gates
        run: Scripts/ci-gate.sh

  linux-wgpu:
    name: Linux wgpu (build + kernel/fusion/dmap parity on llvmpipe)
    runs-on: ubuntu-latest
    container: swift:6.1-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          apt-get update
          apt-get install -y build-essential pkg-config curl unzip \
            libraw-dev liblcms2-dev libexiv2-dev libjpeg-turbo8-dev \
            libtiff-dev libpng-dev zlib1g-dev libopencv-dev \
            libvulkan1 mesa-vulkan-drivers

      - name: Fetch pinned wgpu-native
        run: Scripts/fetch-wgpu.sh

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftpm-wgpu-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: swiftpm-wgpu-${{ runner.os }}-

      # llvmpipe is a software adapter (wgpu reports adapterType CPU), so the
      # parity run opts in via HYPERFOCAL_WGPU_SOFTWARE — the same pattern as
      # WARP on the Windows VM: software validates correctness, not speed.
      - name: Build with wgpu and run parity gates
        env:
          HYPERFOCAL_WGPU: "1"
          HYPERFOCAL_WGPU_SOFTWARE: "1"
        run: |
          swift build
          LD_LIBRARY_PATH=$GITHUB_WORKSPACE/../wgpu-native/lib \
            .build/debug/hyperfocal-cli debug-wgpu
