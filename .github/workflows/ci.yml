name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux (build + synth PSNR gates + probe)
    runs-on: ubuntu-latest
    container: swift:6.1-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          apt-get update
          apt-get install -y build-essential pkg-config \
            libraw-dev liblcms2-dev libexiv2-dev libjpeg-turbo8-dev \
            libtiff-dev libpng-dev zlib1g-dev libopencv-dev

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: swiftpm-${{ runner.os }}-

      - name: Build and run regression gates
        run: Scripts/ci-gate.sh
